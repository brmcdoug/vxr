    image: /home/cisco/images/8000-eft17.0/packages/images/8000/sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    onie-install: /home/cisco/images/8000-eft17.0/packages/images/8000/sonic/sonic-cisco-8000.bin
    qemu_args: -uuid eaf1870e-43ed-4806-bda3-4dc57bed8dd6
    port_breakout:
      lc0:
        0..63: 2x400

  spine01: 
    console_ports: [40003]
    platform: spitfire_f
    os_type: sonic
    linecard_types: ['8122-64EHF-O'] 
    linux_username: "admin"
    linux_password: "password"
    custom_mgmt_inf: True
    mgmt_gateway_ip: "192.168.123.1"
