# topology
#
#        s00 s01           
#         | X |  
#        l00 l01

simulation:
  no_image_copy: true

devices:
  leaf00: 
    console_ports: [40000]
    platform: spitfire_f
    os_type: sonic
    linecard_types: ['8122-64EHF-O'] 
    linux_username: "admin"
    linux_password: "password"
    custom_mgmt_inf: True
    mgmt_gateway_ip: "192.168.123.1"
    linux_config: |
        ip addr add dev eth4 192.168.123.100/24
        ip link set dev eth4 up
    xr_config: |
        sudo config interface ip add eth0 MGMT_IP/MGMT_MASK MGMT_GATEWAY
        sudo config save -y
        SONIC_COMMANDS
    image: /home/cisco/images/8000-eft17.0/packages/images/8000/sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    onie-install: /home/cisco/images/8000-eft17.0/packages/images/8000/sonic/sonic-cisco-8000.bin
    qemu_args: -uuid 002aac7b-2e72-45aa-9722-0456901ea895
    port_breakout:
      lc0:
        0..63: 2x400

  leaf01: 
    console_ports: [40001]
    platform: spitfire_f
    os_type: sonic
    linecard_types: ['8122-64EHF-O'] 
    linux_username: "admin"
