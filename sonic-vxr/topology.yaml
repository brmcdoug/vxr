    qemu_args: -uuid be46f561-2ca8-4670-addd-6619c4c58d5e
    port_breakout:
      lc0:
        0..63: 2x400

  spine00: 
    console_ports: [40002]
    platform: spitfire_f
    os_type: sonic
    linecard_types: ['8122-64EHF-O'] 
    linux_username: "admin"
    linux_password: "password"
    custom_mgmt_inf: True
    mgmt_gateway_ip: "192.168.123.1"
